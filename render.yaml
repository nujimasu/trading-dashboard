services:
  # ── ダッシュボード本体（常時起動） ──────────────────────────────────────
  # Cron ジョブは GitHub Actions (.github/workflows/) で実行
  - type: web
    name: trading-dashboard
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python run.py
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: FMP_API_KEY
        sync: false
      - key: FRED_API_KEY
        sync: false
      - key: POLYGON_API_KEY
        sync: false
