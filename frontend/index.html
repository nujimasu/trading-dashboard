<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trading Dashboard</title>
  <link rel="stylesheet" href="/css/dashboard.css?v=15" />
  <!-- lightweight-charts (TradingView OSS) -->
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

  <!-- Header -->
  <div id="header">
    <div id="header-left">
      <button id="menu-toggle" aria-label="メニュー">☰</button>
      <h1>📈 Trading Dashboard</h1>
    </div>
    <div id="header-stats">
      <span id="market-badge" class="market-badge market-loading" aria-label="市場ヘルス">
        <span class="market-icon">⏳</span>
        <span class="market-label">読込中</span>
      </span>
      <span class="header-stat" title="週次ピック数">
        <span class="header-stat-icon">📋</span>
        <span class="header-stat-val" id="hs-picks">—</span>
      </span>
      <span class="header-stat" title="価格DB銘柄数">
        <span class="header-stat-icon">📦</span>
        <span class="header-stat-val" id="hs-tickers">—</span>
      </span>
    </div>
  </div>
  <div id="sidebar-overlay"></div>

  <!-- Body -->
  <div id="layout">
    <nav id="sidebar"></nav>
    <main id="main"></main>
  </div>

  <script type="module" src="/js/app.js?v=28"></script>
</body>
</html>
