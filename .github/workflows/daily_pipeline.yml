name: Daily Pipeline (Light)

# GH Actions 分数節約のため軽量化:
# - 価格差分DL は「オープンポジ + オープンシグナル」銘柄のみに絞る
# - Stage 3-6 (テクニカル/RR/ファンダ/スコアリング再計算) は weekly に任せる
# - シグナル評価 (ペーパートレード戦績) は毎日継続 (MAE/MFE 精度維持)

on:
  schedule:
    # 月〜金 22:30 UTC = 翌朝 7:30 JST（米国市場クローズ後）
    - cron: "30 22 * * 1-5"
  workflow_dispatch:  # 手動実行も可能

jobs:
  run-daily-light:
    runs-on: ubuntu-latest
    timeout-minutes: 20  # 軽量化に伴い 90→20 に短縮

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily-light (open positions/signals price update + signal evaluation)
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FMP_API_KEY:  ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python pipeline/run_pipeline.py --daily-light
