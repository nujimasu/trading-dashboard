name: Daily Pipeline

# Daily full refresh:
# - Incremental price update
# - Stage 3-6 refresh, market health, daily picks
# - Logic2/3/4 and tech daily refresh

on:
  schedule:
    # 月〜金 22:30 UTC = 翌朝 7:30 JST（米国市場クローズ後）
    - cron: "30 22 * * 1-5"
  workflow_dispatch:  # 手動実行も可能

jobs:
  run-daily:
    runs-on: ubuntu-latest
    timeout-minutes: 180

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run daily full refresh
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FMP_API_KEY:  ${{ secrets.FMP_API_KEY }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          POLYGON_API_KEY: ${{ secrets.POLYGON_API_KEY }}
        run: python pipeline/run_pipeline.py --daily-full
