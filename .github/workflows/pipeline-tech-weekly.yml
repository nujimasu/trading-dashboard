name: Tech Weekly Pipeline (Technical Scan)

on:
  schedule:
    - cron: '0 0 * * 3'   # UTC 0:00 水曜 = JST 9:00
  workflow_dispatch:

jobs:
  tech:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run technical scan
        run: python pipeline/run_pipeline.py --tech-weekly
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
